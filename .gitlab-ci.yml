stages:
  - publish


publish:composer:
  stage: publish
  image: alpine:3.21
  script:
    - apk add --no-cache curl
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        publish_ref="tag=$CI_COMMIT_TAG"
      elif [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        publish_ref="branch=$CI_COMMIT_BRANCH"
      else
        echo "Unsupported ref for Composer publish"
        exit 1
      fi
    - >
      curl --fail-with-body --request POST
      --header "Job-Token: $CI_JOB_TOKEN"
      --data "$publish_ref"
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/composer"
  environment:
    name: package-registry
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: false
    - when: never
